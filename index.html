<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVAFLIX Service</title>
  <style>
    :root {
      --bg: #141414;
      --panel: #1f1f1f;
      --panel-2: #2b2b2b;
      --text: #fff;
      --muted: #b3b3b3;
      --accent: #e50914;
      --ok: #46d369;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input, select { font: inherit; }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 4vw;
      background: linear-gradient(180deg, rgba(20,20,20,0.95), rgba(20,20,20,0.72));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.8px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .menu {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      flex-shrink: 0;
    }
    .menu span { cursor: default; }

    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 8px;
    }
    .search-wrap input {
      width: 100%;
      min-width: 150px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.35);
      color: #fff;
      border-radius: 8px;
      padding: 9px 12px;
    }
    .chip {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.83rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .chip.active { background: #fff; color: #111; font-weight: 700; }

    .hero {
      min-height: 58vh;
      padding: 52px 4vw 42px;
      background:
        linear-gradient(to top, rgba(20,20,20,1), rgba(20,20,20,0.34) 50%, rgba(20,20,20,0.75)),
        radial-gradient(circle at 80% 25%, rgba(229,9,20,0.35), transparent 42%),
        linear-gradient(120deg, #181818, #2f2f2f);
      display: flex;
      align-items: end;
    }
    .hero .content { max-width: 720px; }
    .hero h1 { margin: 0 0 12px; font-size: clamp(2rem, 4.2vw, 3.3rem); line-height: 1.15; }
    .hero p { margin: 0 0 20px; color: #dfdfdf; line-height: 1.55; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      padding: 11px 18px;
      font-weight: 700;
    }
    .btn-play { background: #fff; color: #111; }
    .btn-info { background: rgba(109,109,110,0.75); color: #fff; }
    .btn-danger { background: var(--accent); color: #fff; }

    main { padding: 0 4vw 48px; }
    .row { margin-top: 34px; }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 11px;
    }
    .row h2 { margin: 0; font-size: 1.2rem; }
    .muted { color: var(--muted); font-size: 0.88rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, #2f2f2f, #1b1b1b);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      display: flex;
      flex-direction: column;
      min-height: 245px;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
    .poster {
      min-height: 130px;
      display: flex;
      align-items: end;
      padding: 10px;
      font-size: .72rem;
      color: #ececec;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .meta { padding: 10px; display: grid; gap: 6px; }
    .title { font-weight: 700; font-size: .94rem; }
    .desc { color: var(--muted); font-size: .8rem; line-height: 1.36; min-height: 30px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      border-radius: 999px;
      font-size: .72rem;
      background: rgba(255,255,255,.13);
      color: #f0f0f0;
      padding: 3px 8px;
    }
    .progress {
      background: #3a3a3a;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar { height: 100%; background: var(--accent); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(840px, 100%);
      background: #191919;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 48px rgba(0,0,0,.45);
    }
    .modal-head {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.09);
    }
    .modal-body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .episodes {
      display: grid;
      gap: 8px;
    }
    .episode {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 10px;
      font-size: .87rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .profile {
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 34px;
      padding-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 13px;
      display: grid;
      gap: 10px;
    }
    .panel h3 { margin: 0; font-size: 1rem; }
    .line { display: flex; gap: 8px; }
    .line input, .line select {
      flex: 1;
      background: #101010;
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      border-radius: 8px;
      padding: 9px;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      font-size: .9rem;
    }

    @media (max-width: 900px) {
      .menu { display: none; }
      .chip { display: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">NOVAFLIX</div>
    <div class="menu"><span>홈</span><span>시리즈</span><span>영화</span><span>내 목록</span></div>
    <div class="search-wrap">
      <input id="searchInput" placeholder="제목/장르 검색 (예: 스릴러, 서울)" />
      <button class="chip" data-genre="all">전체</button>
      <button class="chip" data-genre="드라마">드라마</button>
      <button class="chip" data-genre="스릴러">스릴러</button>
      <button class="chip" data-genre="SF">SF</button>
    </div>
  </header>

  <section id="hero" class="hero"></section>

  <main>
    <section class="row">
      <div class="row-head">
        <h2>이어보기</h2>
        <span class="muted" id="continueCount"></span>
      </div>
      <div class="grid" id="continueGrid"></div>
    </section>

    <section class="row">
      <div class="row-head">
        <h2>내가 찜한 콘텐츠</h2>
        <span class="muted" id="myListCount"></span>
      </div>
      <div class="grid" id="myListGrid"></div>
    </section>

    <section class="row">
      <div class="row-head">
        <h2>전체 라이브러리</h2>
        <span class="muted" id="libraryCount"></span>
      </div>
      <div class="grid" id="libraryGrid"></div>
    </section>

    <section class="profile">
      <article class="panel">
        <h3>프로필 설정</h3>
        <div class="line">
          <input id="profileName" placeholder="사용자 이름" />
          <select id="profilePlan">
            <option value="Basic">Basic</option>
            <option value="Standard">Standard</option>
            <option value="Premium">Premium</option>
          </select>
        </div>
        <button id="saveProfileBtn" class="btn btn-danger">프로필 저장</button>
        <div class="muted" id="profileStatus">저장된 프로필 없음</div>
      </article>

      <article class="panel">
        <h3>서비스 상태</h3>
        <div class="muted">로컬 저장소 기반으로 다음 항목이 유지됩니다.</div>
        <div class="muted">• 프로필 정보 • 찜 목록 • 이어보기 진행률</div>
        <div id="serviceHealth" style="color: var(--ok); font-size: 0.88rem;">● 정상 동작</div>
      </article>
    </section>
  </main>

  <div class="modal" id="detailModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div id="modalTitle" style="font-size:1.15rem; font-weight:800"></div>
          <div id="modalSub" class="muted"></div>
        </div>
        <button id="closeModalBtn" class="btn">닫기</button>
      </div>
      <div class="modal-body">
        <div id="modalDesc" style="line-height:1.55"></div>
        <div class="actions">
          <button id="playBtn" class="btn btn-play">▶ 시청하기</button>
          <button id="toggleMyListBtn" class="btn btn-info">+ 내 목록</button>
        </div>
        <div>
          <div style="font-weight:700; margin-bottom:8px">에피소드</div>
          <div class="episodes" id="episodes"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = {
      profile: 'novaflix_profile_v1',
      myList: 'novaflix_mylist_v1',
      progress: 'novaflix_progress_v1'
    };

    const library = [
      { id: 1, title: '서울의 밤', genre: '스릴러', year: 2025, rating: '15+', desc: '도시 전체를 흔드는 실종 사건. 기자와 형사가 진실을 추적한다.', episodes: 10, gradient: 'linear-gradient(130deg,#6f1d1b,#1d1d1d)' },
      { id: 2, title: '데이터 시티', genre: 'SF', year: 2024, rating: '12+', desc: 'AI 행정도시의 숨겨진 오류를 찾기 위한 해커 팀의 작전.', episodes: 8, gradient: 'linear-gradient(130deg,#1f4c6b,#1a1a1a)' },
      { id: 3, title: '런웨이', genre: '드라마', year: 2025, rating: '12+', desc: '스타트업 대표 4인의 성장, 배신, 재도전을 그린 오피스 드라마.', episodes: 12, gradient: 'linear-gradient(130deg,#4f3d1f,#1a1a1a)' },
      { id: 4, title: '고스트 라인', genre: '스릴러', year: 2023, rating: '19+', desc: '지하철 폐선 구간에서 시작된 연쇄 실종. 단서가 사라진다.', episodes: 9, gradient: 'linear-gradient(130deg,#363636,#111)' },
      { id: 5, title: '얼음별', genre: 'SF', year: 2022, rating: '12+', desc: '지구 최후의 빙하 기지, 생존을 건 마지막 원정대의 기록.', episodes: 7, gradient: 'linear-gradient(130deg,#245f73,#1a1a1a)' },
      { id: 6, title: '우리의 내일', genre: '드라마', year: 2024, rating: 'all', desc: '서로 다른 세대가 한 동네에서 만나 삶을 회복해 가는 이야기.', episodes: 16, gradient: 'linear-gradient(130deg,#865d3b,#1d1d1d)' },
      { id: 7, title: '제로타임', genre: '스릴러', year: 2025, rating: '15+', desc: '하루가 반복되는 도시에서 기억을 유지하는 단 한 명의 소방관.', episodes: 11, gradient: 'linear-gradient(130deg,#792828,#1a1a1a)' },
      { id: 8, title: '호라이즌', genre: 'SF', year: 2023, rating: '12+', desc: '민간 우주선 프로젝트의 성공 뒤에 감춰진 데이터 조작 음모.', episodes: 10, gradient: 'linear-gradient(130deg,#293c8b,#161616)' }
    ];

    const state = {
      query: '',
      genre: 'all',
      selectedId: null,
      profile: load(STORAGE_KEY.profile, { name: '', plan: 'Basic' }),
      myList: load(STORAGE_KEY.myList, []),
      progress: load(STORAGE_KEY.progress, {})
    };

    function load(key, fallback) {
      try {
        const v = JSON.parse(localStorage.getItem(key));
        return v ?? fallback;
      } catch { return fallback; }
    }

    function save(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getFilteredLibrary() {
      const q = state.query.trim().toLowerCase();
      return library.filter(item => {
        const genreOk = state.genre === 'all' || item.genre === state.genre;
        const queryOk = !q || item.title.toLowerCase().includes(q) || item.genre.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q);
        return genreOk && queryOk;
      });
    }

    function pickHero() {
      const first = getFilteredLibrary()[0] || library[0];
      const hero = document.getElementById('hero');
      hero.innerHTML = `
        <div class="content">
          <h1>${first.title}</h1>
          <p>${first.desc}</p>
          <div class="actions">
            <button class="btn btn-play" onclick="openDetail(${first.id})">▶ 지금 재생</button>
            <button class="btn btn-info" onclick="openDetail(${first.id})">ℹ 상세 정보</button>
          </div>
        </div>
      `;
    }

    function cardTemplate(item, withProgress = false) {
      const pct = state.progress[item.id] || 0;
      return `
        <article class="card" onclick="openDetail(${item.id})">
          <div class="poster" style="background:${item.gradient}">NOVAFLIX ORIGINAL</div>
          <div class="meta">
            <div class="title">${item.title}</div>
            <div class="desc">${item.desc.slice(0, 44)}...</div>
            <div class="tags">
              <span class="tag">${item.genre}</span>
              <span class="tag">${item.year}</span>
              <span class="tag">${item.rating}</span>
            </div>
            ${withProgress ? `<div class="progress"><div class="bar" style="width:${pct}%"></div></div>` : ''}
          </div>
        </article>
      `;
    }

    function renderLibrary() {
      const list = getFilteredLibrary();
      const libraryGrid = document.getElementById('libraryGrid');
      document.getElementById('libraryCount').textContent = `${list.length}개 콘텐츠`;
      libraryGrid.innerHTML = list.length ? list.map(item => cardTemplate(item)).join('') : '<div class="empty">검색 결과가 없습니다.</div>';
    }

    function renderMyList() {
      const ids = new Set(state.myList);
      const list = library.filter(v => ids.has(v.id));
      const el = document.getElementById('myListGrid');
      document.getElementById('myListCount').textContent = `${list.length}개 저장됨`;
      el.innerHTML = list.length ? list.map(item => cardTemplate(item)).join('') : '<div class="empty">아직 찜한 콘텐츠가 없습니다.</div>';
    }

    function renderContinue() {
      const list = library.filter(item => (state.progress[item.id] || 0) > 0).sort((a,b) => (state.progress[b.id]||0) - (state.progress[a.id]||0));
      const el = document.getElementById('continueGrid');
      document.getElementById('continueCount').textContent = `${list.length}개 진행중`;
      el.innerHTML = list.length ? list.map(item => cardTemplate(item, true)).join('') : '<div class="empty">아직 시청 기록이 없습니다.</div>';
    }

    function renderProfile() {
      const name = state.profile.name || '게스트';
      document.getElementById('profileName').value = state.profile.name || '';
      document.getElementById('profilePlan').value = state.profile.plan || 'Basic';
      document.getElementById('profileStatus').textContent = `현재 사용자: ${name} · 요금제: ${state.profile.plan || 'Basic'}`;
    }

    function openDetail(id) {
      state.selectedId = id;
      const item = library.find(v => v.id === id);
      if (!item) return;
      document.getElementById('modalTitle').textContent = item.title;
      document.getElementById('modalSub').textContent = `${item.year} · ${item.genre} · ${item.rating} · 총 ${item.episodes}화`;
      document.getElementById('modalDesc').textContent = item.desc;

      const isMine = state.myList.includes(item.id);
      document.getElementById('toggleMyListBtn').textContent = isMine ? '✓ 내 목록에서 제거' : '+ 내 목록';

      const episodes = document.getElementById('episodes');
      episodes.innerHTML = Array.from({ length: item.episodes }, (_, i) => {
        const ep = i + 1;
        return `<div class="episode"><span>${ep}화 · ${item.title}</span><button class="btn" onclick="watchEpisode(${item.id}, ${ep})">시청</button></div>`;
      }).join('');

      document.getElementById('detailModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('open');
      state.selectedId = null;
    }

    function toggleMyList() {
      if (!state.selectedId) return;
      const idx = state.myList.indexOf(state.selectedId);
      if (idx >= 0) state.myList.splice(idx, 1);
      else state.myList.push(state.selectedId);
      save(STORAGE_KEY.myList, state.myList);
      renderMyList();
      openDetail(state.selectedId);
    }

    function watchEpisode(id, epNo) {
      const item = library.find(v => v.id === id);
      if (!item) return;
      const pct = Math.min(100, Math.round((epNo / item.episodes) * 100));
      state.progress[id] = pct;
      save(STORAGE_KEY.progress, state.progress);
      renderContinue();
      renderLibrary();
    }

    function bindEvents() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        state.query = e.target.value;
        pickHero();
        renderLibrary();
      });

      document.querySelectorAll('[data-genre]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.genre = btn.dataset.genre;
          document.querySelectorAll('[data-genre]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          pickHero();
          renderLibrary();
        });
      });

      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('detailModal').addEventListener('click', (e) => {
        if (e.target.id === 'detailModal') closeModal();
      });

      document.getElementById('toggleMyListBtn').addEventListener('click', toggleMyList);
      document.getElementById('playBtn').addEventListener('click', () => {
        if (!state.selectedId) return;
        watchEpisode(state.selectedId, 1);
      });

      document.getElementById('saveProfileBtn').addEventListener('click', () => {
        state.profile = {
          name: document.getElementById('profileName').value.trim(),
          plan: document.getElementById('profilePlan').value
        };
        save(STORAGE_KEY.profile, state.profile);
        renderProfile();
      });
    }

    function init() {
      const allBtn = document.querySelector('[data-genre="all"]');
      if (allBtn) allBtn.classList.add('active');
      bindEvents();
      pickHero();
      renderContinue();
      renderMyList();
      renderLibrary();
      renderProfile();
    }

    window.openDetail = openDetail;
    window.watchEpisode = watchEpisode;

    init();
  </script>
</body>
</html>
