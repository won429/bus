<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVAFLIX</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1c1c1c;
      --text: #f5f5f5;
      --sub: #b3b3b3;
      --red: #e50914;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      min-height: 70vh;
      padding: 24px 5vw 60px;
      background:
        linear-gradient(to top, rgba(15,15,15,1), rgba(15,15,15,0.25) 50%, rgba(15,15,15,0.9)),
        radial-gradient(circle at 80% 20%, rgba(229,9,20,0.35), transparent 40%),
        linear-gradient(120deg, #111, #2f2f2f);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 70px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--red);
      letter-spacing: 1px;
    }

    .nav {
      display: flex;
      gap: 18px;
      color: var(--sub);
      font-size: 0.95rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin: 0 0 10px;
      max-width: 700px;
      line-height: 1.15;
    }

    .hero p {
      max-width: 620px;
      color: #e0e0e0;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 11px 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--red);
      color: white;
    }

    .btn-secondary {
      background: rgba(109, 109, 110, 0.75);
      color: white;
    }

    main {
      padding: 0 5vw 50px;
      margin-top: -40px;
    }

    .row {
      margin: 34px 0;
    }

    .row h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
    }

    .cards {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }

    .card {
      background: linear-gradient(180deg, #313131, #1b1b1b);
      border-radius: 10px;
      min-height: 220px;
      overflow: hidden;
      position: relative;
      transition: transform 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
    }

    .thumb {
      height: 65%;
      background: linear-gradient(130deg, #444, #222);
      display: flex;
      align-items: end;
      padding: 10px;
      font-size: 0.75rem;
      color: #ddd;
    }

    .meta {
      padding: 10px;
    }

    .title {
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 0.93rem;
    }

    .desc {
      color: var(--sub);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    footer {
      color: #8f8f8f;
      font-size: 0.85rem;
      padding: 25px 5vw 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="topbar">
      <div class="logo">NOVAFLIX</div>
      <div class="nav">
        <span>홈</span>
        <span>시리즈</span>
        <span>영화</span>
        <span>내가 찜한 콘텐츠</span>
      </div>
    </div>

    <h1>오늘 밤, 몰아보기 딱 좋은 콘텐츠를 만나보세요.</h1>
    <p>
      넷플릭스 스타일로 구성한 스트리밍 UI 데모입니다. 히어로 배너, 콘텐츠 행, 카드 호버 효과까지 포함되어
      있어 포트폴리오/프로토타입으로 바로 활용할 수 있습니다.
    </p>
    <div class="cta">
      <button class="btn btn-primary">▶ 지금 재생</button>
      <button class="btn btn-secondary">ℹ 상세 정보</button>
    </div>
  </section>

  <main id="content"></main>

  <footer>
    NOVAFLIX UI Demo · 실제 서비스가 아닌 샘플 페이지입니다.
  </footer>

  <script>
    const rows = [
      {
        title: "요즘 인기 콘텐츠",
        items: ["서울의 밤", "코드 브레이커", "호라이즌", "제로타임", "스카이 라인", "심해 9층"]
      },
      {
        title: "한국 시리즈 TOP 10",
        items: ["광장", "런웨이", "미드나잇 레코드", "파랑", "불꽃", "나이트콜"]
      },
      {
        title: "몰아보기 추천",
        items: ["데이터 시티", "얼음별", "그레이존", "고스트 라인", "디스트릭트 7", "우리의 내일"]
      }
    ];

    const content = document.getElementById("content");

    rows.forEach((row, idx) => {
      const section = document.createElement("section");
      section.className = "row";

      const title = document.createElement("h2");
      title.textContent = row.title;

      const cards = document.createElement("div");
      cards.className = "cards";

      row.items.forEach((name, i) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="thumb">NOVAFLIX ORIGINAL</div>
          <div class="meta">
            <div class="title">${name}</div>
            <div class="desc">시즌 ${((i + idx) % 4) + 1} · 스릴러/드라마</div>
          </div>
        `;
        cards.appendChild(card);
      });

      section.appendChild(title);
      section.appendChild(cards);
      content.appendChild(section);
    });
  </script>
</body>
</html>
